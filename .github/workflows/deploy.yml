# Nombre del workflow que aparecerá en la pestaña "Actions" de tu repositorio
name: Deploy to GitHub Pages

# Este workflow se ejecutará cada vez que hagas un push a la rama `main`
on:
  push:
    branches:
      - main # Puedes cambiarlo a 'master' o la rama que uses como principal

# Permisos para que la Action pueda escribir en la rama gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js and npm 🏗️
        uses: actions/setup-node@v4
        with:
          node-version: '20' # O la versión de Node que estés usando

      - name: Install and Build 🔧 # Instala dependencias y compila el proyecto
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist