# Nombre del workflow que aparecerá en la pestaña "Actions" de tu repositorio
name: Deploy to GitHub Pages

# Este workflow se ejecutará cada vez que hagas un push a la rama `main`
on:
  push:
    branches:
      - main # Puedes cambiarlo a 'master' o la rama que uses como principal

# Permisos para que la Action pueda escribir en la rama gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup Node.js and npm 🏗️
        uses: actions/setup-node@v6
        with:
          node-version: '20' # O la versión de Node que estés usando

      - name: Install and Build 🔧 # Instala dependencias y compila el proyecto
        run: |
          npm install
          npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v6

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v5
        with:
          # Sube el directorio dist
          path: './dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v5